server:
  port: ${PORT:8080}

spring:
  # ==================== DataSource ====================
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ==================== JPA / Hibernate ====================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Run data.sql AFTER Hibernate creates/updates tables
    defer-datasource-initialization: true

  # ==================== SQL Init (data.sql seed) ====================
  sql:
    init:
      mode: always

  # ==================== Multipart File Upload ====================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ==================== JWT Configuration ====================
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

# ==================== Cloudinary Configuration ====================
# Configuration is now read directly via @Value in CloudinaryConfig.java

# ==================== CORS Configuration ====================
frontend:
  url: ${FRONTEND_URL}
