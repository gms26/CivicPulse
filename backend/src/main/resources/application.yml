server:
  port: ${PORT:8080}

spring:
  # ==================== DataSource ====================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ==================== JPA / Hibernate ====================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    # Run data.sql AFTER Hibernate creates/updates tables
    defer-datasource-initialization: true

  # ==================== SQL Init (data.sql seed) ====================
  sql:
    init:
      mode: always

  # ==================== Multipart File Upload ====================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ==================== JWT Configuration ====================
app:
  jwt:
    secret: ${JWT_SECRET:Y2l2aWNwdWxzZS1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLWhzMjU2}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# ==================== Cloudinary Configuration ====================
# Configuration is now read directly via @Value in CloudinaryConfig.java

logging:
  level:
    root: INFO